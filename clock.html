<!DOCTYPE html>
<html>
<head>
  <title>Analog + Digital Clock</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #503535;
    }
    canvas {
      background: white;
      border-radius: 50%;
      margin-top: 20px;
    }
    #time {
      font-size: 30px;
      margin: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Analog + Digital Clock</h2>

<canvas id="clockCanvas" width="300" height="300"></canvas>

<div id="time"></div>

<button onclick="startClock()">Start</button>
<button onclick="stopClock()">Stop</button>

<script>
let canvas = document.getElementById("clockCanvas");
let ctx = canvas.getContext("2d");
let radius = canvas.height / 2;
ctx.translate(radius, radius);
radius = radius * 0.9;

let running = true;

function drawClock() {
  if (!running) return;

  drawFace(ctx, radius);
  drawNumbers(ctx, radius);
  drawTime(ctx, radius);

  updateDigital();
}

function drawFace(ctx, radius) {
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, 2 * Math.PI);
  ctx.fillStyle = "white";
  ctx.fill();

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 5;
  ctx.stroke();
}

function drawNumbers(ctx, radius) {
  ctx.font = radius * 0.15 + "px Arial";
  ctx.textBaseline = "middle";
  ctx.textAlign = "center";

  for (let num = 1; num <= 12; num++) {
    let ang = num * Math.PI / 6;
    ctx.rotate(ang);
    ctx.translate(0, -radius * 0.8);
    ctx.rotate(-ang);
    ctx.fillText(num.toString(), 0, 0);
    ctx.rotate(ang);
    ctx.translate(0, radius * 0.8);
    ctx.rotate(-ang);
  }
}

function drawTime(ctx, radius) {
  let now = new Date();
  let hour = now.getHours();
  let minute = now.getMinutes();
  let second = now.getSeconds();

  // Hour
  hour = hour % 12;
  hour = (hour * Math.PI / 6) +
         (minute * Math.PI / (6 * 60));
  drawHand(ctx, hour, radius * 0.5, 6);

  // Minute
  minute = (minute * Math.PI / 30);
  drawHand(ctx, minute, radius * 0.7, 4);

  // Second
  second = (second * Math.PI / 30);
  drawHand(ctx, second, radius * 0.9, 2, "red");
}

function drawHand(ctx, pos, length, width, color="black") {
  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.lineCap = "round";
  ctx.strokeStyle = color;
  ctx.moveTo(0, 0);
  ctx.rotate(pos);
  ctx.lineTo(0, -length);
  ctx.stroke();
  ctx.rotate(-pos);
}

function updateDigital() {
  let now = new Date();
  let timeString = now.toLocaleTimeString();
  document.getElementById("time").innerText = timeString;
}

function startClock() {
  running = true;
}

function stopClock() {
  running = false;
}

setInterval(drawClock, 1000);
</script>

</body>
</html>
