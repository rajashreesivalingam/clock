<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Clock</title>

<style>
body {
    margin: 0;
    background: #787c83;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Window */
.container {
    width: 400px;
    background: #111827;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(243, 172, 172, 0.7);
    padding-bottom: 20px;
}

/* Title Bar */
.title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #2a2f3a;
    color: white;
}

/* Clock */
.clock {
    width: 220px;
    height: 220px;
    border: 10px solid #7f8186;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
}

/* Center dot */
.center {
    width: 10px;
    height: 10px;
    background: #000;
    border: 2px solid white;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Hands */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%) rotate(0deg);
}

.hour {
    width: 6px;
    height: 50px;
    background: white;
}

.minute {
    width: 4px;
    height: 70px;
    background: white;
}

.second {
    width: 2px;
    height: 90px;
    background: red;
}

/* Digital Timer */
.digital {
    text-align: center;
    color: white;
    font-size: 36px;
    margin-top: 10px;
}

/* Labels */
.labels {
    display: flex;
    justify-content: space-around;
    color: #9ca3af;
    font-size: 12px;
    margin-bottom: 15px;
}

/* Buttons */
.buttons {
    display: flex;
    justify-content: space-around;
    margin: 10px;
}

button {
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.start { background: #22c55e; }
.stop { background: #ef4444; }
.reset {
    display: block;
    margin: 10px auto;
    background: #7d7f83;
    border: 1px solid #374151;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        <span>🕒 Timer Clock</span>
        <span>— □ ✕</span>
    </div>

    <div class="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center"></div>
    </div>

    <div class="digital" id="time">00:00:00</div>

    <div class="labels">
        <span>HOURS</span>
        <span>MINUTES</span>
        <span>SECONDS</span>
    </div>

    <div class="buttons">
        <button class="start" onclick="startTimer()">▶ START</button>
        <button class="stop" onclick="stopTimer()">■ STOP</button>
    </div>

    <button class="reset" onclick="resetTimer()">⟲ RESET</button>

</div>

<script>
/* Analog Clock */
function updateClock() {
    const now = new Date();

    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr = now.getHours();

    document.getElementById("second").style.transform =
        `translateX(-50%) rotate(${sec * 6}deg)`;

    document.getElementById("minute").style.transform =
        `translateX(-50%) rotate(${min * 6}deg)`;

    document.getElementById("hour").style.transform =
        `translateX(-50%) rotate(${hr * 30 + min / 2}deg)`;
}

setInterval(updateClock, 1000);

/* Timer */
let seconds = 0;
let timer = null;

function updateTimer() {
    seconds++;

    let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
    let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    let secs = String(seconds % 60).padStart(2, '0');

    document.getElementById("time").innerText =
        `${hrs}:${mins}:${secs}`;
}

function startTimer() {
    if (!timer) {
        timer = setInterval(updateTimer, 1000);
    }
}

function stopTimer() {
    clearInterval(timer);
    timer = null;
}

function resetTimer() {
    stopTimer();
    seconds = 0;
    document.getElementById("time").innerText = "00:00:00";
}
</script>

</body>
</html>
