<!DOCTYPE html>
<html>
<head>
  <title>Analog + Digital Clock</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f0f0f0;
    }

    canvas {
      background: white;
      border-radius: 50%;
      margin-top: 20px;
    }

    #digital {
      font-size: 28px;
      margin: 15px;
      font-weight: bold;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Analog + Digital Clock</h2>

<canvas id="clock" width="300" height="300"></canvas>

<div id="digital"></div>

<button onclick="startClock()">Start</button>
<button onclick="stopClock()">Stop</button>

<script>
const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");
let radius = canvas.height / 2;
ctx.translate(radius, radius);
radius = radius * 0.9;

let running = true;

// Draw clock every second
setInterval(drawClock, 1000);

function drawClock() {
  if (!running) return;

  drawFace();
  drawNumbers();
  drawTime();
  updateDigital();
}

function drawFace() {
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, 2*Math.PI);
  ctx.fillStyle = "white";
  ctx.fill();

  ctx.strokeStyle = "#333";
  ctx.lineWidth = 5;
  ctx.stroke();
}

function drawNumbers() {
  ctx.font = radius*0.15 + "px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let num = 1; num <= 12; num++) {
    let ang = num * Math.PI / 6;
    ctx.rotate(ang);
    ctx.translate(0, -radius*0.8);
    ctx.rotate(-ang);
    ctx.fillText(num, 0, 0);
    ctx.rotate(ang);
    ctx.translate(0, radius*0.8);
    ctx.rotate(-ang);
  }
}

function drawTime() {
  let now = new Date();
  let hour = now.getHours();
  let minute = now.getMinutes();
  let second = now.getSeconds();

  // Hour
  hour = hour % 12;
  hour = (hour*Math.PI/6) + (minute*Math.PI/(6*60));
  drawHand(hour, radius*0.5, 6);

  // Minute
  minute = (minute*Math.PI/30);
  drawHand(minute, radius*0.8, 4);

  // Second
  second = (second*Math.PI/30);
  drawHand(second, radius*0.9, 2, "red");
}

function drawHand(pos, length, width, color="black") {
  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.strokeStyle = color;
  ctx.lineCap = "round";
  ctx.moveTo(0, 0);
  ctx.rotate(pos);
  ctx.lineTo(0, -length);
  ctx.stroke();
  ctx.rotate(-pos);
}

function updateDigital() {
  let now = new Date();
  document.getElementById("digital").innerText =
    now.toLocaleTimeString();
}

// Buttons
function startClock() {
  running = true;
}

function stopClock() {
  running = false;
}
</script>

</body>
</html>
