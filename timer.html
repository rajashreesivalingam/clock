<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer Clock</title>
<style>
    body {
        background: #0f172a;
        font-family: arial, sans-serif;
        text-align: center;
        color: #fff;
    }
    h1{
        margin: top 200px;
    }

    .clock 
    {
        background: #1e293b;
        border: 8px solid #333;
        width: 250px;
        height: 250px;
        border-radius: 20px;
        margin: 30px auto;
        position:relative;
        
    }

    .hand {
        position: absolute;
        width:50%;
        height: 2px;
        background-color: #fff;
        top: 50%;
        transform-origin: 100%;
        transform: rotate(90deg);
    }
    .second{
        background: #ef4444;
        height: 2px;
    }
    .minute{
        height:4px;
    }
    .hour{
        height: 6px;
        width: 35%;
    }
    .digital{
        font-size: 40px;
        margin: 20px;
        letter-spacing: 3px;
    }

    .buttons{
        display: flex;
        justify-content: center;
        gap: 15px;
    } 
    button {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor:pointer;    
    }

    .start { background: #22c55e; color: white; }
    .stop { background: #ef4444; color: white;}
    .reset { background: #3b82f6; color: white;}

    button:hover {
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="clock-container">
    <div class="time" id="display">00:00:00</div>
    <div class="buttons">
        <button class="start" onclick="startTimer()">Start</button>
        <button class="stop" onclick="stopTimer()">Stop</button>
        <button class="reset" onclick="resetTimer()">Reset</button>
    </div>
</div>

<script>
let seconds = 0;
let interval = null;

function updateDisplay() {
    let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
    let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    let secs = String(seconds % 60).padStart(2, '0');

    document.getElementById("display").textContent = `${hrs}:${mins}:${secs}`;
}

function startTimer() {
    if (!interval) {
        interval = setInterval(() => {
            seconds++;
            updateDisplay();
        }, 1000);
    }
}

function stopTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {
    stopTimer();
    seconds = 0;
    updateDisplay();
}
</script>

</body>
</html>
