<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analog Timer Clock</title>
<style>
    body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    /* Analog Clock */
    .clock {
        width: 250px;
        height: 250px;
        border: 8px solid #333;
        border-radius: 50%;
        margin: 30px auto;
        position: relative;
        background: #111827;
    }

    .hand {
        position: absolute;
        width: 50%;
        height: 2px;
        background: white;
        top: 50%;
        transform-origin: 100%;
        transform: rotate(90deg);
    }

    .second { background: red; height: 2px; }
    .minute { height: 4px; }
    .hour { height: 6px; width: 35%; }

    /* Digital Timer */
    .digital {
        font-size: 40px;
        margin: 20px;
        letter-spacing: 3px;
    }

    /* Buttons */
    .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    button {
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .start { background: green; color: white; }
    .stop { background: red; color: white; }
    .reset { background: gray; color: white; }
</style>
</head>
<body>

<h1>Timer Clock</h1>

<div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
</div>

<div class="digital" id="time">00:00:00</div>

<div class="buttons">
    <button class="start" onclick="startTimer()">Start</button>
    <button class="stop" onclick="stopTimer()">Stop</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
</div>

<script>
    // Analog Clock
    function updateClock() {
        const now = new Date();

        const sec = now.getSeconds();
        const min = now.getMinutes();
        const hr = now.getHours();

        document.getElementById("second").style.transform =
            `rotate(${sec * 6}deg)`;

        document.getElementById("minute").style.transform =
            `rotate(${min * 6}deg)`;

        document.getElementById("hour").style.transform =
            `rotate(${hr * 30 + min / 2}deg)`;
    }

    setInterval(updateClock, 1000);

    // Timer
    let seconds = 0;
    let timer = null;

    function updateTimer() {
        seconds++;

        let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
        let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
        let secs = String(seconds % 60).padStart(2, '0');

        document.getElementById("time").innerText =
            `${hrs}:${mins}:${secs}`;
    }

    function startTimer() {
        if (!timer) {
            timer = setInterval(updateTimer, 1000);
        }
    }

    function stopTimer() {
        clearInterval(timer);
        timer = null;
    }

    function resetTimer() {
        stopTimer();
        seconds = 0;
        document.getElementById("time").innerText = "00:00:00";
    }
</script>

</body>
</html>
